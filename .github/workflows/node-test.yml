name: Node.js Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: useblacksmith/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Print version
        run: |
          node --version
          npm --version

      - name: Create and run test project
        run: |
          npm init -y
          npm install --save-dev jest
          mkdir -p src
          cat <<'EOF' > src/math.js
          function add(a, b) { return a + b; }
          function multiply(a, b) { return a * b; }
          function fibonacci(n) {
            if (n <= 1) return n;
            let a = 0, b = 1;
            for (let i = 2; i <= n; i++) {
              [a, b] = [b, a + b];
            }
            return b;
          }
          module.exports = { add, multiply, fibonacci };
          EOF
          cat <<'EOF' > src/math.test.js
          const { add, multiply, fibonacci } = require('./math');
          test('add', () => { expect(add(2, 3)).toBe(5); });
          test('multiply', () => { expect(multiply(4, 5)).toBe(20); });
          test('fibonacci(10)', () => { expect(fibonacci(10)).toBe(55); });
          test('fibonacci(0)', () => { expect(fibonacci(0)).toBe(0); });
          EOF
          npx jest --verbose
